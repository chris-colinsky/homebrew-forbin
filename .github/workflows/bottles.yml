name: Build and Publish Bottles

on:
  push:
    branches: [main]
    paths:
      - Formula/forbin.rb
  workflow_dispatch:

jobs:
  build:
    name: Build bottle on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26, macos-15]

    steps:
      - uses: actions/checkout@v6

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Extract version and root URL
        id: meta
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'forbin_mcp-(\d+\.\d+\.\d+)\.tar\.gz', open('Formula/forbin.rb').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "root_url=https://github.com/${{ github.repository }}/releases/download/forbin-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Strip bottle block from formula before building
        run: |
          python3 -c "
          import re
          path = 'Formula/forbin.rb'
          formula = open(path).read()
          formula = re.sub(r'\n  bottle do\n(?:.*\n)*?  end\n', '\n', formula)
          open(path, 'w').write(formula)
          "
          cp Formula/forbin.rb "$(brew --repo chris-colinsky/forbin)/Formula/forbin.rb" || true

      - name: Wait for forbin-mcp to appear on PyPI
        # Guards against a CDN propagation race: release.yml in the source
        # repo pushes the formula update as soon as PyPI's JSON API confirms
        # the new version, but the simple index (which pip queries) sometimes
        # lags by a few minutes. Without this poll, `brew install` below
        # fails with "Could not find a version that satisfies the
        # requirement forbin-mcp==X.Y.Z" even though the JSON API already
        # shows it.
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SIMPLE_URL="https://pypi.org/simple/forbin-mcp/"
          echo "Polling $SIMPLE_URL for forbin-mcp==$VERSION ..."
          for i in $(seq 1 30); do
            if curl -fsSL "$SIMPLE_URL" | grep -q "forbin_mcp-${VERSION}\."; then
              echo "Found forbin-mcp==$VERSION on simple index after ~$((i * 5))s"
              exit 0
            fi
            echo "Attempt $i/30: not yet — sleeping 5s"
            sleep 5
          done
          echo "::error::forbin-mcp==$VERSION did not appear on the PyPI simple index after 150s"
          exit 1

      - name: Install for bottling
        run: brew install --build-bottle chris-colinsky/forbin/forbin

      - name: Create bottle
        run: |
          brew bottle \
            --json \
            --root-url="${{ steps.meta.outputs.root_url }}" \
            chris-colinsky/forbin/forbin
          echo "--- Bottle files created ---"
          ls -la *.bottle* 2>/dev/null || echo "No .bottle files found in $(pwd)"

      - name: Upload bottle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bottles-${{ matrix.os }}
          path: |
            *.bottle*.tar.gz
            *.bottle*.json

  publish:
    name: Publish bottles and update formula
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download all bottles
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: bottles/

      - name: Extract version
        id: meta
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'forbin_mcp-(\d+\.\d+\.\d+)\.tar\.gz', open('Formula/forbin.rb').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename bottles for download URL compatibility
        run: |
          # brew bottle creates "formula--version.arch.bottle.tar.gz" (double dash)
          # but Homebrew downloads "formula-version.arch.bottle.tar.gz" (single dash)
          cd bottles
          for f in *--*.bottle*.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f/--/-}"
          done
          echo "--- Renamed bottles ---"
          ls *.bottle*.tar.gz 2>/dev/null || echo "No bottle tarballs found"

      - name: Create release and upload bottles
        uses: softprops/action-gh-release@v3
        with:
          tag_name: forbin-${{ steps.meta.outputs.version }}
          name: "Bottles for forbin ${{ steps.meta.outputs.version }}"
          files: bottles/*.bottle*.tar.gz
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula with bottle block
        run: python3 .github/scripts/update_bottle_block.py bottles/ Formula/forbin.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/forbin.rb
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "bottles: add ${{ steps.meta.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push
